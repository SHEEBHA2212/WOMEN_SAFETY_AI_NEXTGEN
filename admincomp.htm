<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:40px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#5f7c8a;
color:white;
}
</style>

</head>

<body>

<h1>Complaint Dashboard</h1>

<table id="complaintTable">
<thead>
<tr>
<th>ID</th>
<th>Issue</th>
<th>Location</th>
<th>Description</th>
<th>Contact</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

async function loadComplaints(){

const response = await fetch("http://127.0.0.1:5000/get_complaints");

const data = await response.json();

const table = document.querySelector("#complaintTable tbody");

table.innerHTML = "";

data.forEach(c => {

const row = `
<tr>
<td>${c.id}</td>
<td>${c.issueType}</td>
<td>${c.location}</td>
<td>${c.description}</td>
<td>${c.contact}</td>
<td>${c.status}</td>
<td>
<button onclick="resolveComplaint(${c.id})">Resolve</button>
<button onclick="deleteComplaint(${c.id})">Delete</button>
</td>
</tr>
`;

table.innerHTML += row;

});

}

loadComplaints();

async function deleteComplaint(id){

await fetch(`http://127.0.0.1:5000/delete_complaint/${id}`,{
method:"DELETE"
});

loadComplaints();
async function resolveComplaint(id){

await fetch(`http://127.0.0.1:5000/resolve_complaint/${id}`,{
method:"PUT"
});

loadComplaints();
}

}

</script>

</body>
</html>
