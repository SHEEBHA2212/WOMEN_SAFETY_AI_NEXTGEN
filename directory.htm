<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help Directory</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #eef4f1;
    --card-color: #fdfcf9;
    --text-color: #2e2e2e;
    --subtext-color: #666;
    --primary: #5f7c8a;
    --highlight: #c0392b;
}

body.dark {
    --bg-color: #202123;
    --card-color: #2a2b2e;
    --text-color: #ececec;
    --subtext-color: #b4b4b4;
    --primary: #7fa6b3;
    --highlight: #e74c3c;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-color);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: 0.3s ease;
}

/* Header */
header {
    background: var(--card-color);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

header h2 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-color);
}

header button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: var(--subtext-color);
}

/* Container */
.container {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 30px 20px;
}

.card {
    background: var(--card-color);
    padding: 25px;
    width: 100%;
    max-width: 550px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.card p {
    font-size: 14px;
    color: var(--subtext-color);
    margin-bottom: 20px;
}

label {
    font-size: 13px;
    color: var(--text-color);
    margin-bottom: 5px;
    display: block;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
}

button.find-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--primary);
    color: white;
    font-size: 14px;
    cursor: pointer;
}

button.find-btn:hover {
    opacity: 0.9;
}

/* Results */
.results {
    margin-top: 20px;
}

.result-item {
    background: rgba(0,0,0,0.03);
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-size: 14px;
}

body.dark .result-item {
    background: rgba(255,255,255,0.05);
}

/* Emergency Section */
.emergency {
    margin-top: 25px;
    padding: 12px;
    border-radius: 8px;
    background: var(--highlight);
    color: white;
    font-size: 14px;
    text-align: center;
}
</style>
</head>

<body>

<header>
    <button onclick="goHome()">Home</button>
    <h2>Support Directory</h2>
    <button onclick="toggleDarkMode()">🌙</button>
</header>

<div class="container">
    <div class="card">

        <p>Find verified support services and emergency contacts near your location.</p>

        <label>Enter Location</label>
        <input type="text" id="locationInput" placeholder="City or Area">

        <label>Select Help Type</label>
        <select id="helpType">
            <option value="">Select type</option>
            <option>Emergency</option>
            <option>Medical</option>
            <option>Police</option>
            <option>Counseling</option>
            <option>Women Support</option>
        </select>

        <button class="find-btn" onclick="findHelp()">Find Help</button>

        <div class="results" id="results"></div>

        <div class="emergency">
            🚨 In immediate danger? Call 112 right now.
        </div>

    </div>
</div>

<script>

/* Dark Mode Sync */
window.onload = function() {
    if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark");
    }
};

function toggleDarkMode() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("darkMode", "enabled");
    } else {
        localStorage.setItem("darkMode", "disabled");
    }
}

function goHome() {
    window.location.href = "index.htm";
}

function findHelp() {
    const location = document.getElementById("locationInput").value.trim();
    const type = document.getElementById("helpType").value;
    const resultsDiv = document.getElementById("results");

    if (location === "" || type === "") {
        alert("Please enter location and select help type.");
        return;
    }

    resultsDiv.innerHTML = "";

    let services = [];

    if (type === "Emergency") {
        services = [
            "National Emergency Helpline - 112",
            "Women Helpline - 181",
            "Child Helpline - 1098"
        ];
    }
    else if (type === "Medical") {
        services = [
            "City Government Hospital",
            "24x7 Ambulance - 108",
            "Local Health Care Center"
        ];
    }
    else if (type === "Police") {
        services = [
            "Nearest Police Station",
            "Women Police Helpline - 1091",
            "Cyber Crime Helpline - 1930"
        ];
    }
    else if (type === "Counseling") {
        services = [
            "Mental Health Support Line",
            "Confidential Counseling Center",
            "Student Support Services"
        ];
    }
    else if (type === "Women Support") {
        services = [
            "Women Protection Cell",
            "Legal Aid Support",
            "Domestic Violence Helpline - 181"
        ];
    }

    services.forEach(service => {
        const div = document.createElement("div");
        div.className = "result-item";
        div.textContent = service + " (" + location + ")";
        resultsDiv.appendChild(div);
    });
}

</script>

</body>
</html>
