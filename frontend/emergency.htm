<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Assistance</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --text: #2e2e2e;
    --subtext: #666;
    --danger: #d64545;
    --neutral: #e9ecef;
}

body.dark {
    --bg: #121212;          /* soft dark background */
    --card: #1e1e1e;        /* dark card */
    --text: #f0f0f0;        /* lighter text */
    --subtext: #cccccc;     /* soft subtext */
    --danger: #ff4c4c;      /* panic button */
    --neutral: #2a2a2a;     /* action buttons */
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background: url("./images/bg6.png") center/cover no-repeat;
    color: var(--text);
}
body::before{
    content:"";
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.3);
    z-index:0;
}

header {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
}

header button {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    color: var(--text);
}

/* Layout */
.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

.card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(15px);
    width: 100%;
    max-width: 500px;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

/* Head Text */
.card h3 {
    font-size: 22px;
    margin-bottom: 10px;
    color: var(--text);
}

.card p {
    font-size: 14px;
    color: var(--subtext);
    margin-bottom: 25px;
}

/* Panic Button */
.panic-btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(135deg,#ff4c4c,#d64545);
    color: white;
    margin-bottom: 30px;
    cursor: pointer;
    transition: 0.3s;
}

.panic-btn:hover {
    transform: scale(1.03);
}

/* Actions Grid */
.actions-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

.action-btn {
    padding: 18px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    background: rgba(255,255,255,0.6);
    color: var(--text);
    cursor: pointer;
    transition: 0.3s;
}

.action-btn:hover {
    transform: scale(1.05);
}

/* Location Box */
.location-box {
    margin-top: 25px;
    padding: 12px;
    font-size: 14px;
    background: rgba(255,255,255,0.6);
    border-radius: 12px;
    display: none;
    word-wrap: break-word;
    backdrop-filter: blur(10px);
}

body.dark .card {
    background: rgba(30,30,30,0.8);
}

body.dark .action-btn,
body.dark .location-box {
    background: rgba(255,255,255,0.1);
}

a {
    color: #3b82f6;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}

footer{
text-align:center;
padding:15px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
font-size:12px;
margin-top:20px;
}

</style>
</head>

<body>

<header>
    <button onclick="goHome()">Home</button>
    <h2>Emergency</h2>
    <button onclick="toggleDarkMode()">🌙</button>
</header>

<div class="container">
    <div class="card">

        <h3>Immediate Assistance</h3>
        <p>If you are in danger, activate panic mode or contact emergency services below.</p>

        <button class="panic-btn" onclick="activatePanic()">
            Activate Panic Mode
        </button>

        <div class="actions-grid">
            <button class="action-btn" onclick="callNumber('112')">National Emergency (112)</button>
            <button class="action-btn" onclick="callNumber('100')">Police</button>
            <button class="action-btn" onclick="callNumber('108')">Ambulance</button>
            <button class="action-btn" onclick="sendSMS()">Send Emergency SMS</button>
        </div>

        <div id="locationBox" class="location-box"></div>

    </div>
</div>

<footer>
Safe Space © 2026 | Women Safety Initiative <br>
Contact: support@safespace.com
</footer>


<script>
/* Dark Mode */
window.onload = function() {
    if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark");
    }
};

function toggleDarkMode() {
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode",
        document.body.classList.contains("dark") ? "enabled" : "disabled");
}

function goHome() {
    window.location.href = "index.htm";
}

/* Panic Mode */
function activatePanic() {
    if (!confirm("Activate Panic Mode?")) return;

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {

            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;

            const box = document.getElementById("locationBox");
            box.style.display = "block";
            box.innerHTML =
                "Location detected.<br><a href='" + mapLink +
                "' target='_blank'>Open in Maps</a>";

            window.currentLocation =
                "I am in emergency. My location: " + mapLink;
        });
    }
}

/* Call */
function callNumber(num) {
    if (confirm("Call emergency services?")) {
        window.location.href = "tel:" + num;
    }
}

/* SMS */
function sendSMS() {
    let message = window.currentLocation || "I am in emergency. Please help.";
    window.location.href = "sms:?body=" + encodeURIComponent(message);
}
</script>

</body>
</html>
