<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Emergency System</title>

<style>
body { font-family: Arial; margin:0; background:#eef4f1; }

.chat { height:60vh; overflow:auto; padding:10px; }

.msg {
    padding:10px; margin:6px;
    border-radius:10px; max-width:80%;
}
.user { background:#5f7c8a; color:white; margin-left:auto; }
.bot { background:#e6ece9; }
.panic { background:#ff3b3b; color:white; font-weight:bold; }

.controls {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    padding:10px;
}

button {
    padding:12px;
    border:none;
    border-radius:8px;
    background:#5f7c8a;
    color:white;
    cursor:pointer;
}
button:hover { background:#4a6775; }

input {
    width:100%;
    padding:10px;
    border:none;
    border-top:1px solid #ccc;
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="controls">

<button onclick="cmd('panic')">🚨 Panic</button>
<button onclick="cmd('emergency')">🚑 Emergency</button>
<button onclick="cmd('police')">🚓 Police</button>

<button onclick="cmd('ambulance')">🚑 Ambulance</button>
<button onclick="cmd('fire')">🔥 Fire</button>
<button onclick="cmd('women')">👩 Women</button>

<button onclick="cmd('child')">🧒 Child</button>
<button onclick="cmd('track')">📍 Track</button>
<button onclick="cmd('share')">📤 Share Loc</button>

<button onclick="cmd('maps')">🗺 Open Maps</button>
<button onclick="cmd('hospital')">🏥 Hospital</button>
<button onclick="cmd('safe')">🛡 Safety</button>

<button onclick="cmd('alert')">📢 Alert</button>
<button onclick="cmd('sms')">📩 SOS SMS</button>
<button onclick="cmd('status')">✅ Status</button>

</div>

<input id="input" placeholder="Ask AI (optional)...">

<script>
const chat = document.getElementById("chat");

// ---------- MESSAGE ----------
function add(text, type="bot") {
    const d = document.createElement("div");
    d.className = "msg " + type;
    d.innerHTML = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
}

// ---------- LOCATION CORE ----------
async function getLocation() {
    return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
            reject("Geolocation not supported");
        }

        navigator.geolocation.getCurrentPosition(
            pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                const acc = pos.coords.accuracy;

                resolve({ lat, lng, acc });
            },
            err => {
                reject(err.message);
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    });
}

// ---------- COMMAND ENGINE ----------
async function cmd(c) {

    const hour = new Date().getHours();

    if (c === "panic") {
        add("🚨 PANIC MODE ACTIVATED<br>📞 CALL 112 NOW<br>📍 Tracking + Alert recommended", "panic");
        return;
    }

    if (c === "emergency") {
        add(`🚑 Emergency<br>📞 112<br>${hour>21||hour<6?"🌙 Night risk":"☀️ Stay alert"}`, "panic");
        return;
    }

    if (c === "police") {
        window.location.href = "tel:100";
        return;
    }

    if (c === "ambulance") {
        window.location.href = "tel:108";
        return;
    }

    if (c === "fire") {
        window.location.href = "tel:101";
        return;
    }

    if (c === "women") {
        window.location.href = "tel:181";
        return;
    }

    if (c === "child") {
        window.location.href = "tel:1098";
        return;
    }

    if (c === "track") {
        add("📡 Getting accurate location...");
        try {
            const loc = await getLocation();

            add(`📍 Lat: ${loc.lat}<br>Lng: ${loc.lng}<br>Accuracy: ${loc.acc}m`);

        } catch(e) {
            add("❌ Location failed: " + e);
        }
        return;
    }

    if (c === "share") {
        try {
            const loc = await getLocation();
            const url = `https://www.google.com/maps?q=${loc.lat},${loc.lng}`;

            navigator.clipboard.writeText(url);
            add("📤 Location copied! Send to contacts:<br>" + url);

        } catch(e) {
            add("❌ Unable to share location");
        }
        return;
    }

    if (c === "maps") {
        window.open("https://maps.google.com", "_blank");
        return;
    }

    if (c === "hospital") {
        window.open("https://www.google.com/maps/search/hospital+near+me");
        return;
    }

    if (c === "safe") {
        add("🛡 Stay visible • Avoid isolation • Share location • Trust instincts");
        return;
    }

    if (c === "alert") {
        add("📢 Alert triggered (connect to backend for real use)");
        return;
    }

    if (c === "sms") {
        window.location.href = "sms:?body=HELP! I need assistance immediately.";
        return;
    }

    if (c === "status") {
        add("✅ System Ready<br>🟢 GPS Enabled<br>🟢 Commands Active");
        return;
    }
}

// ---------- AI ----------
let API_KEY = null;

async function AI(msg) {

    if (!API_KEY) {
        API_KEY = prompt("Enter API Key:");
    }

    try {
        const r = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method:"POST",
            headers:{
                "Authorization":"Bearer "+API_KEY,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                model:"mistralai/mistral-7b-instruct:free",
                messages:[
                    {role:"system",content:"You are emergency assistant."},
                    {role:"user",content:msg}
                ]
            })
        });

        const d = await r.json();
        return d.choices?.[0]?.message?.content || "No reply";

    } catch {
        return "⚠️ AI unavailable";
    }
}

// ---------- INPUT ----------
document.getElementById("input").addEventListener("keypress", async e => {
    if (e.key === "Enter") {

        const val = e.target.value.trim();
        if (!val) return;

        add(val,"user");
        e.target.value="";

        add("⏳ Thinking...");
        const reply = await AI(val);
        chat.lastChild.remove();
        add(reply);
    }
});

// ---------- INIT ----------
add("🛡 Safe Emergency System Ready<br>Tap buttons for instant help");

</script>

</body>
</html>
