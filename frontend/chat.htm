<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Space Support</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #eef4f1;
    --card-color: #fdfcf9;
    --text-color: #2e2e2e;
    --subtext-color: #666;
    --user-msg: #5f7c8a;
    --bot-msg: #e6ece9;
}

body.dark {
    --bg-color: #202123;
    --card-color: #2a2b2e;
    --text-color: #ececec;
    --subtext-color: #b4b4b4;
    --user-msg: #7fa6b3;
    --bot-msg: #3a3b3f;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-color);
    display: flex;
    flex-direction: column;
    height: 100vh;
    transition: 0.3s ease;
}

/* Header */
header {
    background: var(--card-color);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

header h2 {
    font-weight: 600;
    font-size: 18px;
    color: var(--text-color);
}

header button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: var(--subtext-color);
}

/* Chat */
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.message {
    max-width: 75%;
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
}

.user {
    align-self: flex-end;
    background: var(--user-msg);
    color: white;
}

.bot {
    align-self: flex-start;
    background: var(--bot-msg);
    color: var(--text-color);
}

/* Suggestions */
.suggestion-container {
    display: flex;
    gap: 8px;
    margin-top: -6px;
    margin-bottom: 8px;
}

.suggest-btn {
    padding: 6px 12px;
    font-size: 12px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    background: #d9e4df;
}

.suggest-btn:hover {
    background: #c7d6d0;
}

/* Input */
.input-area {
    display: flex;
    padding: 14px;
    background: var(--card-color);
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
    font-family: 'Inter', sans-serif;
    outline: none;
}

/* Send Button */
button.send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--user-msg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

button.send-btn svg {
    width: 18px;
    height: 18px;
    fill: white;
}

button.send-btn:hover {
    opacity: 0.85;
}

/* Typing */
.typing {
    font-size: 12px;
    color: var(--subtext-color);
    font-style: italic;
}
</style>
</head>

<body>

<header>
    <button onclick="goHome()">Home</button>
    <h2>Safe Space Support</h2>
    <button onclick="toggleDarkMode()">🌙</button>
</header>

<div class="chat-container" id="chat"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Type your message..." />
    <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24">
            <path d="M2 21L23 12 2 3v7l15 2-15 2z"/>
        </svg>
    </button>
</div>

<script>

/* LOAD SAVED THEME */
window.onload = function() {
    if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark");
    }
};

const chat = document.getElementById("chat");

function addMessage(text, type) {
    const msg = document.createElement("div");
    msg.classList.add("message", type);
    msg.innerHTML = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("userInput");
    const userText = input.value.trim();
    if (!userText) return;

    addMessage(userText, "user");
    input.value = "";

    showTyping();

    setTimeout(() => {
        respond(userText.toLowerCase());
    }, 1000);
}

function showTyping() {
    const typing = document.createElement("div");
    typing.classList.add("typing");
    typing.id = "typing";
    typing.innerText = "Support is typing...";
    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
    const typing = document.getElementById("typing");
    if (typing) typing.remove();
}

function respond(message) {
    removeTyping();

    let reply = "";
    let suggestionHTML = "";

    if (message.includes("emergency") || message.includes("danger") || message.includes("urgent")) {
        reply = "If you are in immediate danger, please contact emergency services right away.";
        suggestionHTML = `
        <div class="suggestion-container">
            <button class="suggest-btn" onclick="location.href='emergency.htm'">🚨 Emergency</button>
        </div>`;
    }

    else if (message.includes("complaint") || message.includes("report")) {
        reply = "You can file a complaint securely.";
        suggestionHTML = `
        <div class="suggestion-container">
            <button class="suggest-btn" onclick="location.href='complaint.htm'">Go to Complaint</button>
        </div>`;
    }

    else {
        reply = "I'm here to listen. How can I assist you?";
    }

    addMessage(reply, "bot");

    if (suggestionHTML !== "") {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = suggestionHTML;
        chat.appendChild(wrapper);
        chat.scrollTop = chat.scrollHeight;
    }
}

function goHome() {
    window.location.href = "index.htm";
}

/* TOGGLE + SAVE */
function toggleDarkMode() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("darkMode", "enabled");
    } else {
        localStorage.setItem("darkMode", "disabled");
    }
}

document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
