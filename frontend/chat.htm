<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Space Support</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #eef4f1;
    --card-color: #fdfcf9;
    --text-color: #2e2e2e;
    --subtext-color: #666;
    --user-msg: #5f7c8a;
    --bot-msg: #e6ece9;
}

body.dark {
    --bg-color: #202123;
    --card-color: #2a2b2e;
    --text-color: #ececec;
    --subtext-color: #b4b4b4;
    --user-msg: #7fa6b3;
    --bot-msg: #3a3b3f;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body { font-family: 'Inter',sans-serif; 
    background: var(--bg-color); 
    display: flex; flex-direction: 
    column; height: 100vh; 
    transition: 0.3s ease; }

/* Header */
header {
    background: var(--card-color);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

header h2 {
    font-weight: 600;
    font-size: 18px;
    color: var(--text-color);
}

header button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: var(--subtext-color);
}

/* Chat */
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.message {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(6px)}
    to{opacity:1; transform:translateY(0)}
}

.user {
    align-self: flex-end;
    background: var(--user-msg);
    color: white;
}

.bot {
    align-self: flex-start;
    background: var(--bot-msg);
    color: var(--text-color);
}

/* Suggestions */
.suggestion-container {
    display: flex;
    gap: 8px;
    margin-top: -6px;
    margin-bottom: 8px;
}

.suggest-btn {
    padding: 8px 14px;
    font-size: 12px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(4px);
    transition: 0.2s;
}

.suggest-btn:hover {
    transform: translateY(-2px);
    background: white;
}

/* Input */
.input-area {
    display: flex;
    padding: 14px;
    background: var(--card-color);
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
    font-family: 'Inter', sans-serif;
    outline: none;
}

/* Send Button */
button.send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--user-msg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

button.send-btn svg {
    width: 18px;
    height: 18px;
    fill: white;
}

button.send-btn:hover {
    opacity: 0.85;
}

/* Typing */
.typing {
    font-size: 12px;
    color: var(--subtext-color);
    font-style: italic;
}
</style>
</head>

<body>

<header>
    <button onclick="goHome()">Home</button>
    <h2>Safe Space Support</h2>
    <button onclick="toggleDarkMode()">🌙</button>
</header>



<div class="input-area">
    <input type="text" id="userInput" placeholder="Type command like @help" />
    <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24">
            <path d="M2 21L23 12 2 3v7l15 2-15 2z"/>
        </svg>
    </button>
</div>

<div class="chat-container" id="chat"></div>
<div class="suggestion-container">
<button class="suggest-btn" onclick="quickCommand('@help')">@help</button>
<button class="suggest-btn" onclick="quickCommand('@complaint')">@complaint</button>
<button class="suggest-btn" onclick="quickCommand('@status')">@status</button>
<button class="suggest-btn" onclick="quickCommand('@emergency')">@emergency</button>
<button class="suggest-btn" onclick="quickCommand('@contact')">@contact</button>
<button class="suggest-btn" onclick="quickCommand('@feedback')">@feedback</button>
<button class="suggest-btn" onclick="quickCommand('@report')">@report</button>
<button class="suggest-btn" onclick="quickCommand('@safety')">@safety</button>
<button class="suggest-btn" onclick="quickCommand('@nearestpolice')">@nearestpolice</button>


</div>

<script>

function quickCommand(command){
    document.getElementById("userInput").value = command;
    sendMessage();
}    

/* LOAD SAVED THEME */
window.onload = function() {
    if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark");
    }
};

const chat = document.getElementById("chat");

function addMessage(text, type) {
    const msg = document.createElement("div");
    msg.classList.add("message", type);
    msg.innerHTML = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("userInput");
    const userText = input.value.trim();
    if (!userText) return;

    addMessage(userText, "user");
    input.value = "";

    showTyping();

    fetch("http://127.0.0.1:8000/api/support/chatbot/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: userText
        })
    })
    .then(response => response.json())
    .then(data => {
        removeTyping();
        addMessage(data.reply, "bot");
    })
    .catch(error => {
        removeTyping();
        addMessage("Support system is currently unavailable.", "bot");
    });
}

function showTyping() {
    const typing = document.createElement("div");
    typing.classList.add("typing");
    typing.id = "typing";
    typing.innerText = "Support is typing...";
    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
    const typing = document.getElementById("typing");
    if (typing) typing.remove();
}

function goHome() {
    window.location.href = "index.htm";
}

/* TOGGLE + SAVE */
function toggleDarkMode() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("darkMode", "enabled");
    } else {
        localStorage.setItem("darkMode", "disabled");
    }
}

document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
window.onload = function() {
    if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark");
    }

    addMessage("Hello 👋 I'm your Safety Assistant.<br>Type <b>@help</b> to see available commands.", "bot");
};

</script>

</body>
</html>
