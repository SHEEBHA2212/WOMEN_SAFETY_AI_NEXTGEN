<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confidential Complaint</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--text:#2e2e2e;
--sub:#666;
--card:rgba(255,255,255,0.75);
--primary:#5f7c8a;
}

body.dark{
--text:#fff;
--sub:#ccc;
--card:rgba(30,30,30,0.8);
}

body{
font-family:'Inter',sans-serif;
min-height:100vh;
background:url("../images/bg6.png") center/cover no-repeat;
color:var(--text);
}

body::before{
content:"";
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.3);
z-index:0;
}

/* HEADER */
header{
position:relative;
z-index:1;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
}

.menu{cursor:pointer;font-size:18px;}
.toggle{cursor:pointer;}

/* MAIN */
.container{
position:relative;
z-index:1;
display:flex;
justify-content:center;
padding:40px 20px;
}

.card{
background:var(--card);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
width:100%;
max-width:500px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

h2{text-align:center;margin-bottom:10px;}
p.subtitle{text-align:center;color:var(--sub);margin-bottom:20px;}

label{font-size:13px;margin-top:10px;display:block;}

input,textarea,select{
width:100%;
padding:12px;
margin-top:5px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.6);
font-size:14px;
}

textarea{height:100px;}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:15px;
background:linear-gradient(135deg,#6a8ea0,#4e6f7a);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.success{
margin-top:10px;
padding:10px;
background:#d4edda;
color:#155724;
border-radius:8px;
display:none;
}

/* TRACK BOX */
.track-box{
margin-top:25px;
padding-top:15px;
border-top:1px solid rgba(0,0,0,0.1);
}

.result{
margin-top:10px;
font-size:14px;
color:green;
}

.success {
    animation: fadeIn 0.4s ease;
}

/* FOOTER */
footer{
text-align:center;
padding:15px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
font-size:12px;
margin-top:20px;
}

</style>
</head>

<body>

<header>
<div class="menu" onclick="goHome()">🏠 Home</div>
<div>Complaint Portal</div>
<div class="toggle" onclick="toggleDarkMode()">🌙</div>
</header>
<div class="container">
<div class="card">

<h2>Confidential Complaint</h2>
<p class="subtitle">Your report is safe & confidential</p>

<label>Type of Issue</label>
<select id="issueType">
<option value="">Select issue</option>
<option>Harassment</option>
<option>Bullying</option>
<option>Unsafe Environment</option>
<option>Discrimination</option>
<option>Other</option>
</select>

<label>Location</label>
<input type="text" id="location">

<label>Description</label>
<textarea id="description"></textarea>

<label>Contact (optional)</label>
<input type="text" id="contact">

<button type="button" onclick="submitComplaint()">Submit Complaint</button>

<div class="success" id="successMsg"></div>

<!-- TRACKING -->
<div class="track-box">
<h3>Track Complaint</h3>
<input type="text" id="trackId" placeholder="Enter Complaint ID">
<button type="button" onclick="trackComplaint()">Track</button>
<div class="result" id="trackResult"></div>
</div>

</div>
</div>

<footer>
Safe Space © 2026 | Women Safety Initiative <br>
Contact: support@safespace.com
</footer>

<script>

/* DARK MODE */
function toggleDarkMode(){
document.body.classList.toggle("dark");
localStorage.setItem("darkMode",
document.body.classList.contains("dark") ? "enabled" : "disabled");
}

window.onload=function(){
if(localStorage.getItem("darkMode")==="enabled"){
document.body.classList.add("dark");
}
}

/* SUBMIT COMPLAINT */
function submitComplaint(){

    if(event) event.preventDefault();  // 🔥 ADD THIS

    let issue = document.getElementById("issueType").value;
    let desc = document.getElementById("description").value;

    if(issue === "" || desc === ""){
        alert("Fill required fields");
        return;
    }

    fetch("http://127.0.0.1:8000/api/complaints/create/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            issue_type: issue,
            location: document.getElementById("location").value,
            description: desc,
            contact: document.getElementById("contact").value
        })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("successMsg").style.display = "block";
        document.getElementById("successMsg").innerHTML =
        "✅ Complaint submitted! Your ID: <b>" + data.complaint_id + "</b>";

    })
    .catch(()=>{
        alert("Error submitting complaint");
    });
}

/* TRACK COMPLAINT */
function trackComplaint(){

let id = document.getElementById("trackId").value;

fetch("http://127.0.0.1:8000/api/complaints/track/" + id + "/")
.then(res => res.json())
.then(data => {

if(data.error){
document.getElementById("trackResult").innerHTML = "❌ Not found";
}else{
document.getElementById("trackResult").innerHTML =
"Status: " + data.status + "<br>Type: " + data.issue_type;
}

})
.catch(()=>{
document.getElementById("trackResult").innerHTML = "Server error";
});

}

function goHome(){
window.location.href="index.htm";
}

</script>

</body>
</html>
