<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women Safety Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{ box-sizing:border-box; }

:root{
--bg-overlay: rgba(0,0,0,0.3);
--card-bg: rgba(255,255,255,0.7);
--text:#222;
--button:#6a5acd;
--input-bg: rgba(255,255,255,0.6);
}

.dark{
--bg-overlay: rgba(0,0,0,0.6);
--card-bg: rgba(30,30,30,0.8);
--text:#fff;
--button:#8a7cff;
--input-bg: rgba(255,255,255,0.1);
}

body{
margin:0;
font-family:'Poppins',sans-serif;

background-image:url("../images/bg3.jpeg");
background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;
align-items:flex-start;

padding-top:100px;

color:var(--text);
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:var(--bg-overlay);
z-index:0;
}

.container{
position:relative;
z-index:1;

width:360px;
padding:40px 35px;

background:var(--card-bg);
border-radius:20px;

box-shadow:0 10px 40px rgba(0,0,0,0.3);

backdrop-filter:blur(12px);

text-align:center;

animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
from{ opacity:0; transform:translateY(30px); }
to{ opacity:1; transform:translateY(0); }
}

h2{
margin-bottom:25px;
font-weight:600;
}

/* FLOATING INPUT */
.input-group{
position:relative;
margin:18px 0;
}

.input-group input{
width:100%;
padding:16px 12px;

border-radius:12px;
border:none;

background:var(--input-bg);

font-size:15px;
text-align:center;

outline:none;

transition:0.3s;
}

.input-group label{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);

color:#777;
font-size:14px;
pointer-events:none;

transition:0.3s;
background:transparent;
padding:0 5px;
}

/* FLOAT EFFECT */
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
top:-8px;
left:20px;
transform:none;
font-size:12px;
color:var(--button);
background:var(--card-bg);
border-radius:5px;
}

.input-group input:focus{
background:white;
box-shadow:0 0 0 2px rgba(106,90,205,0.4);
}

button{
width:100%;
padding:12px;

border:none;
border-radius:10px;

background:linear-gradient(135deg,#6a5acd,#8a7cff);
color:white;

font-size:15px;
cursor:pointer;

margin-top:15px;

transition:0.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.toggle{
position:absolute;
top:20px;
right:20px;
cursor:pointer;
font-size:14px;
background:white;
padding:6px 10px;
border-radius:6px;
z-index:2;
}

.links{
margin-top:15px;
font-size:14px;
}

.links a{
text-decoration:none;
color:var(--button);
}

.links a:hover{
text-decoration:underline;
}

#errorMsg{
color:red;
display:none;
margin-top:10px;
}

</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">🌙</div>

<div class="container">

<h2>Women Safety Login Portal</h2>

<div class="input-group">
<input id="name" type="text" required placeholder=" ">
<label>Full Name</label>
</div>

<div class="input-group">
<input id="email" type="email" required placeholder=" ">
<label>Email ID</label>
</div>

<div class="input-group">
<input id="password" type="password" required placeholder=" ">
<label>Password</label>
</div>

<div class="input-group">
<input id="mobile" type="tel" required placeholder=" ">
<label>Mobile Number</label>
</div>

<div class="input-group">
<input id="otp" type="text" required placeholder=" ">
<label>Enter OTP</label>
</div>

<button onclick="sendOTP()" id="otpBtn">Send OTP</button>

<div id="timer" style="margin-top:8px; font-size:14px;"></div>

<button onclick="login()">Login</button>

<div id="errorMsg">Login failed</div>

<div class="links">
<a href="login.htm">Login Again</a> |
<a href="index.htm">Back to Home</a>
</div>

</div>

<script>

let generatedOTP = "";
let otpExpireTime = 0;
let countdown;

function toggleMode(){
document.body.classList.toggle("dark");
}


/* SEND OTP */

function sendOTP(){

let mobile = document.getElementById("mobile").value;
let errorBox = document.getElementById("errorMsg");

if(mobile === ""){
errorBox.innerHTML = "Enter mobile number first";
errorBox.style.display="block";
return;
}

/* Generate random OTP */
generatedOTP = Math.floor(1000 + Math.random() * 9000);

alert("Demo OTP: " + generatedOTP);   // For testing

/* OTP expiry 2 minutes */
otpExpireTime = Date.now() + (2 * 60 * 1000);

startTimer();

document.getElementById("otpBtn").disabled = true;

}


/* TIMER FUNCTION */

function startTimer(){

let timerDisplay = document.getElementById("timer");

clearInterval(countdown);

countdown = setInterval(function(){

let remaining = otpExpireTime - Date.now();

if(remaining <= 0){

clearInterval(countdown);
timerDisplay.innerHTML = "OTP expired";

document.getElementById("otpBtn").disabled = false;

generatedOTP = "";

return;

}

let minutes = Math.floor((remaining / 1000) / 60);
let seconds = Math.floor((remaining / 1000) % 60);

if(seconds < 10) seconds = "0" + seconds;

timerDisplay.innerHTML = "OTP expires in: " + minutes + ":" + seconds;

},1000);

}


/* LOGIN */

function login(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;
let mobile = document.getElementById("mobile").value;
let otp = document.getElementById("otp").value;

let errorBox = document.getElementById("errorMsg");

if(name === "" || email === "" || password === "" || mobile === "" || otp === ""){
errorBox.innerHTML = "Please fill all fields";
errorBox.style.display = "block";
return;
}


/* CHECK OTP */

if(Date.now() > otpExpireTime){
errorBox.innerHTML = "OTP expired. Request again.";
errorBox.style.display="block";
return;
}

if(otp != generatedOTP){
errorBox.innerHTML = "Invalid OTP";
errorBox.style.display="block";
return;
}


/* SAVE USER DATA */

localStorage.setItem("loggedIn", "true");
localStorage.setItem("name", name);
localStorage.setItem("email", email);
localStorage.setItem("mobile", mobile);


/* REDIRECT */

window.location.href="index.htm";

}
</script>

</body>
</html>
