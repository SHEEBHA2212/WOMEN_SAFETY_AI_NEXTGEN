<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women Safety Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

:root{
--bg-overlay: rgba(0,0,0,0.3);
--card-bg: rgba(255,255,255,0.7);
--text:#222;
--button:#6a5acd;
--input-bg: rgba(255,255,255,0.6);
}

.dark{
--bg-overlay: rgba(0,0,0,0.6);
--card-bg: rgba(30,30,30,0.8);
--text:#fff;
--button:#8a7cff;
--input-bg: rgba(255,255,255,0.1);
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:url("./images/bg3.jpeg") center/cover no-repeat;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:100px;
color:var(--text);
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:var(--bg-overlay);
z-index:0;
}

.container{
position:relative;
z-index:1;
width:360px;
padding:40px 35px;
background:var(--card-bg);
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
backdrop-filter:blur(12px);
text-align:center;
}

h2{ margin-bottom:25px; }

/* INPUT */
.input-group{
position:relative;
margin:18px 0;
}

.input-group input{
width:100%;
padding:16px 12px;
border-radius:12px;
border:none;
background:var(--input-bg);
text-align:center;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#6a5acd,#8a7cff);
color:white;
cursor:pointer;
margin-top:12px;
}

.toggle{
position:absolute;
top:20px;
right:20px;
cursor:pointer;
background:white;
padding:5px 10px;
border-radius:6px;
}

#errorMsg{
color:red;
display:none;
margin-top:10px;
}

#timer{
margin-top:8px;
font-size:14px;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">🌙</div>

<div class="container">

<h2>Login Portal</h2>

<div class="input-group">
<input id="name" type="text" placeholder="Full Name">
</div>

<div class="input-group">
<input id="email" type="email" placeholder="Email">
</div>

<div class="input-group">
<input id="password" type="password" placeholder="Password">
</div>

<div class="input-group">
<input id="mobile" type="tel" placeholder="Mobile Number">
</div>

<div class="input-group">
<input id="otp" type="text" placeholder="Enter OTP">
</div>

<!-- IMPORTANT: type="button" prevents reload -->
<button type="button" onclick="sendOTP()" id="otpBtn">Send OTP</button>

<div id="timer"></div>

<button type="button" onclick="login()">Login</button>

<div id="errorMsg"></div>

</div>

<script>

let generatedOTP = "";
let otpExpireTime = 0;
let countdown;

/* DARK MODE */
function toggleMode(){
document.body.classList.toggle("dark");
}

/* SEND OTP */
function sendOTP(){

let mobile = document.getElementById("mobile").value;
let errorBox = document.getElementById("errorMsg");

if(mobile === ""){
errorBox.innerHTML = "Enter mobile number first";
errorBox.style.display="block";
return;
}

/* GENERATE OTP */
generatedOTP = Math.floor(1000 + Math.random() * 9000);
alert("Demo OTP: " + generatedOTP);

/* SET EXPIRY (2 MIN) */
otpExpireTime = Date.now() + (2 * 60 * 1000);

startTimer();

document.getElementById("otpBtn").disabled = true;
errorBox.style.display="none";
}

/* TIMER */
function startTimer(){

let timerDisplay = document.getElementById("timer");

clearInterval(countdown);

countdown = setInterval(function(){

let remaining = otpExpireTime - Date.now();

if(remaining <= 0){
clearInterval(countdown);
timerDisplay.innerHTML = "OTP expired";
document.getElementById("otpBtn").disabled = false;
generatedOTP = "";
return;
}

let minutes = Math.floor((remaining/1000)/60);
let seconds = Math.floor((remaining/1000)%60);

if(seconds < 10) seconds = "0" + seconds;

timerDisplay.innerHTML = "OTP expires in: " + minutes + ":" + seconds;

},1000);
}

/* LOGIN */
function login(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;
let mobile = document.getElementById("mobile").value;
let otp = document.getElementById("otp").value;

let errorBox = document.getElementById("errorMsg");

/* VALIDATION */
if(!name || !email || !password || !mobile || !otp){
errorBox.innerHTML = "Please fill all fields";
errorBox.style.display = "block";
return;
}

/* OTP CHECK */
if(Date.now() > otpExpireTime){
errorBox.innerHTML = "OTP expired";
errorBox.style.display="block";
return;
}

if(otp != generatedOTP){
errorBox.innerHTML = "Invalid OTP";
errorBox.style.display="block";
return;
}

/* SUCCESS LOGIN */
localStorage.setItem("loggedIn","true");
localStorage.setItem("name",name);

alert("Login successful ✅");

/* REDIRECT */
window.location.href = "index.htm";
}

</script>

</body>
</html>
