<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Space</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #eef4f1;
    --card-color: #fdfcf9;
    --text-color: #2e2e2e;
    --subtext-color: #666;
    --primary: #5f7c8a;
    --emergency: #e57373;
}

body.dark {
    --bg-color: #202123;
    --card-color: #2a2b2e;
    --text-color: #ececec;
    --subtext-color: #b4b4b4;
    --primary: #7fa6b3;
    --emergency: #ff7a7a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body { font-family: 'Inter', sans-serif;
    background: var(--bg-color); 
    min-height: 100vh; display: flex; 
    justify-content: center; 
    align-items: center; }

/* Main card */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(14px);
    width: 100%;
    max-width: 500px;
    padding: 45px 30px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.2);
}
h1 {
    font-size: 30px;
    color: var(--text-color);
    margin-bottom: 10px;
}

.subtitle {
    font-size: 15px;
    color: var(--subtext-color);
    margin-bottom: 30px;
}

/* 2×2 grid buttons */
.grid-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
}

a { text-decoration: none; }

.btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.25s ease;
}

/* ALL FOUR BLUE */
.primary {
    background: linear-gradient(135deg,#6a8ea0,#4e6f7a);
    color:white;
}

.emergency {
    background: linear-gradient(135deg,#ff6b6b,#e53935);
    color:white;
}

.btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 12px 25px rgba(0,0,0,0.25);
}

/* Emergency bottom */
.emergency-wrap {
    margin-top: 10px;
}

/* Disclaimer */
.disclaimer {
    margin-top: 25px;
    font-size: 12px;
    color: var(--subtext-color);
}

/* Top buttons */
.escape-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #4a4a4a;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
}

.toggle-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: #d9e4df;
    border: none;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
}

body.dark .toggle-btn {
    background: #3a3b3f;
    color: white;
}

/* Mobile */
@media (max-width: 480px) {
    .grid-buttons {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleDarkMode()">🌙 Mode</button>
<button class="escape-btn" onclick="quickExit()">Quick Exit</button>

<div class="card">
    <h1>Safe Space</h1>
    <p class="subtitle">Confidential help. Safe reporting. Immediate support.</p>

    <!-- 4 BLUE BOXES -->
    <div class="grid-buttons">
        <a href="chat.htm"><button class="btn primary">💬 Talk to Support</button></a>
        <a href="complaint.htm"><button class="btn primary">📝 File Complaint</button></a>
        <a href="legal.htm"><button class="btn primary">⚖️ Legal Help</button></a>
        <a href="directory.htm"><button class="btn primary">📍 Nearby Help</button></a>
    </div>

    <!-- EMERGENCY RED -->
    <div class="emergency-wrap">
        <a href="emergency.htm"><button class="btn emergency">🚨 Emergency</button></a>
    </div>

    <p class="disclaimer">
        This tool provides general guidance and is not a substitute for professional legal, medical, or emergency services.
    </p>
</div>

<script>
function quickExit() {
    sessionStorage.clear();
    localStorage.clear();
    window.location.replace("https://www.google.com");
}

function toggleDarkMode() {
    document.body.classList.toggle("dark");
    localStorage.setItem(
        "darkMode",
        document.body.classList.contains("dark") ? "enabled" : "disabled"
    );
}

window.onload = function () {
    if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
