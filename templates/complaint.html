<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confidential Complaint - Safe Space</title>

<link rel="stylesheet" href="/static/css/global.css">

<style>
/* Page specific over-rides */
body {
    background-image: url("/static/images/bg6.png");
}

.form-card {
    width: 100%;
    max-width: 500px;
    padding: 30px;
}

h2 {text-align:center;margin-bottom:10px;}
p.subtitle {text-align:center;color:var(--text-muted);margin-bottom:20px;}

label {font-size:13px;margin-top:10px;display:block; font-weight:600; color:var(--text-main);}

.success {
    margin-top:10px;
    padding:10px;
    background:rgba(16, 185, 129, 0.2);
    color:var(--success);
    border: 1px solid var(--success);
    border-radius:8px;
    display:none;
}

/* TRACK BOX */
.track-box{
    margin-top:25px;
    padding-top:20px;
    border-top:1px solid var(--card-border);
}

.result{
    margin-top:10px;
    font-size:14px;
    color:var(--success);
    font-weight: 500;
}
</style>
</head>

<body>

<nav class="navbar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="icon-btn" onclick="location.href='/'" title="Back to Home" style="font-size: 1.2rem; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--card-bg); border: 1px solid var(--card-border); cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">⬅️</div>
            <div class="nav-title" onclick="location.href='/'">Safe Space</div>
        </div>
    <div class="nav-actions">
        <div class="icon-btn" onclick="toggleDarkMode()" title="Toggle Dark Mode" id="themeToggleBtn">🌙</div>
    </div>
</nav>

<div class="main-content">
    <div class="glass-panel form-card animate-fade-in">
        
        <h2>Confidential Complaint</h2>
        <p class="subtitle">Your report is safe, secure & strictly confidential.</p>

        <div class="input-group">
            <label>Type of Issue</label>
            <select id="issueType" class="input-control">
                <option value="">Select issue</option>
                <option>Harassment</option>
                <option>Bullying</option>
                <option>Unsafe Environment</option>
                <option>Discrimination</option>
                <option>Other</option>
            </select>
        </div>

        <div class="input-group">
            <label>Location</label>
            <input type="text" id="location" class="input-control" placeholder="Auto-detecting...">
        </div>

        <div class="input-group">
            <label>Description</label>
            <textarea id="description" class="input-control" style="height:100px;" placeholder="Describe what happened..."></textarea>
        </div>

        <div class="input-group">
            <label>Contact (optional)</label>
            <input type="text" id="contact" class="input-control" placeholder="Phone or email">
        </div>

        <button type="button" class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="submitComplaint()">Submit Complaint</button>

        <div class="success" id="successMsg"></div>

        <!-- TRACKING -->
        <div class="track-box">
            <h3 style="font-size:1.1rem; margin-bottom:10px;">Track Existing Complaint</h3>
            <div class="input-group" style="display:flex; gap:10px;">
                <input type="text" id="trackId" class="input-control" placeholder="Enter Complaint ID">
                <button type="button" class="btn btn-secondary" onclick="trackComplaint()">Track</button>
            </div>
            <div class="result" id="trackResult"></div>
        </div>

    </div>
</div>

<footer class="glass-footer">
    Safe Space Initiative © 2026<br>
    Providing a secure safety network globally.
</footer>

<script>
let userLat = null;
let userLon = null;

/* DARK MODE */
function toggleDarkMode(){
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");
    localStorage.setItem("darkMode", isDark ? "enabled" : "disabled");
    updateThemeIcon(isDark);
}

function updateThemeIcon(isDark) {
    const btn = document.getElementById("themeToggleBtn");
    if (btn) {
        btn.innerText = isDark ? "☀️" : "🌙";
        btn.title = isDark ? "Toggle Light Mode" : "Toggle Dark Mode";
    }
}

/* SHOW COMPLAINT ID */
function showComplaintId(id){
    let msg = document.getElementById("successMsg");
    msg.style.display = "block";
    msg.innerHTML = "✅ Complaint submitted securely! Your tracked ID: <b>" + id + "</b>";
}

/* LOAD */
window.onload = function(){
    const isDark = localStorage.getItem("darkMode")==="enabled";
    if(isDark){
        document.body.classList.add("dark");
    }
    updateThemeIcon(isDark);
    getLocation();

    /* RESTORE LAST ID */
    let savedId = localStorage.getItem("lastComplaintId");
    if(savedId){
        showComplaintId(savedId);
    }
}

/* GET LOCATION */
function getLocation(){
    document.getElementById("location").value = "Acquiring coordinates...";
    
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(position){
            userLat = position.coords.latitude;
            userLon = position.coords.longitude;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLon}`)
            .then(res=>res.json())
            .then(data=>{
                document.getElementById("location").value = data.display_name || "Unknown District";
            }).catch(() => {
                document.getElementById("location").value = `Coordinates: ${userLat.toFixed(4)}, ${userLon.toFixed(4)}`;
            });
        }, function(error) {
            document.getElementById("location").value = "Location unavailable. Please type manually.";
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
    } else {
        document.getElementById("location").value = "Geolocation not supported.";
    }
}

/* SUBMIT */
function submitComplaint(){
    let issue = document.getElementById("issueType").value;
    let desc = document.getElementById("description").value;

    if(issue === "" || desc === ""){
        alert("Please fill in the required fields (Issue Type and Description).");
        return;
    }

    fetch("http://127.0.0.1:8000/api/complaints/create/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            issue_type: issue,
            location: document.getElementById("location").value,
            description: desc,
            contact: document.getElementById("contact").value,
            latitude: userLat,
            longitude: userLon
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.complaint_id) {
            localStorage.setItem("lastComplaintId", data.complaint_id);
            showComplaintId(data.complaint_id);
        } else {
            console.log("Offline mode - mocked track ID generation");
            let mockId = "CMP-" + Math.floor(Math.random()*10000);
            localStorage.setItem("lastComplaintId", mockId);
            showComplaintId(mockId);
        }
    })
    .catch(()=>{
        console.log("Error submitting to server, mocking ID for offline testing");
        let mockId = "CMP-" + Math.floor(Math.random()*10000);
        localStorage.setItem("lastComplaintId", mockId);
        showComplaintId(mockId);
    });
}

/* TRACK */
function trackComplaint(){
    let id = document.getElementById("trackId").value;
    if(!id) return;
    
    fetch("http://127.0.0.1:8000/api/complaints/track/" + id + "/")
    .then(res => res.json())
    .then(data => {
        if(data.error){
            document.getElementById("trackResult").innerHTML = "❌ Complaint not found";
            document.getElementById("trackResult").style.color = "var(--accent)";
        }else{
            document.getElementById("trackResult").innerHTML = 
            "Status: <strong style='color:var(--primary)'>" + data.status + "</strong><br>Type: " + data.issue_type;
            document.getElementById("trackResult").style.color = "var(--success)";
        }
    })
    .catch(()=>{
        let expectedMock = localStorage.getItem("lastComplaintId");
        if(id === expectedMock) {
            document.getElementById("trackResult").innerHTML = "Status: <strong style='color:var(--primary)'>Under Review (Mock)</strong><br>Type: " + document.getElementById("issueType").value;
            document.getElementById("trackResult").style.color = "var(--success)";
        } else {
            document.getElementById("trackResult").innerHTML = "Server unreachable/ID not found";
            document.getElementById("trackResult").style.color = "var(--accent)";
        }
    });
}
</script>

<!-- GLOBAL SOS BUTTON -->
<button class="floating-sos" onclick="triggerGlobalSOS()" title="Emergency SOS">🚨</button>
<script>
function triggerGlobalSOS() {
    if(confirm("Activate immediate SOS? This will alert emergency contacts and share your location.")){
        const ec = localStorage.getItem("emergencyContact") || "";
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                const message = "EMERGENCY! I need immediate help. My live location: " + mapLink;
                window.location.href = `sms:${ec}?body=` + encodeURIComponent(message);
                
                setTimeout(() => { if(!ec) window.location.href = "tel:112"; }, 1500);
            }, function(error) {
                window.location.href = ec ? `tel:${ec}` : "tel:112";
            });
        } else {
            window.location.href = ec ? `tel:${ec}` : "tel:112";
        }
    }

}
</script>

</body>
</html>
